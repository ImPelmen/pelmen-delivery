spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/delivery_db
    username: postgres
    password: admin
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: true
logging:
  level:
    org.flywaydb: DEBUG
jwt:
  secret: YW55d2hlcmVyYWluc2l4c2lsdmVyemVicmFwZXJzb25ob3Vyb3V0dGVycmlibGVyZWM=
  expiration: 86400000